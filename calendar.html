<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Calendar</title>
        <link rel="stylesheet" href="style.css">
        <script src="calendar.js"></script>
    </head>
    <body>
        <section class="redirect-btn-section">
            <a class="redirect-btn" href='index.html'>
                <img class="btn-icon" title="Go to timer" src="assets/clock.svg" alt="timer">
            </a>
        </section>

        <div id="month-selector">
            <button title="prev month"><</button>
            <p id="month-text">February</p>
            <button title="next month">></button>
        </div>

        <section id="calendar-cells"></section>
        <p id="focus-time-text"></p>
        <section id="task-history"></section>
    </body>
</html>
